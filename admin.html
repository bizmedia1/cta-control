<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard (Vb)</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 40px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #b8b8b8;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: #0f1115;
      color: white;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg,#F2C313,#FFD84D);
      color: black;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      color: #9ddf9d;
    }

    .small {
      margin-top: 20px;
      font-size: 13px;
      color: #8f8f8f;
      line-height: 1.6;
    }

    code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 5px;
    }
  </style></head>
<body>  <div class="card"><h1>CTA Dashboard</h1>

<p>
  Update your WhatsApp CTA link here
</p>

<label>WhatsApp Link</label>

<input
  type="text"
  id="linkInput"
  placeholder="https://wa.me/234xxxxxxxxxx"
/>

<button id="saveBtn">
  Save Link
</button>

<div class="status" id="status"></div>



  </div>  <script>

    // =============================
    // CONFIGURATION
    // =============================

    const GITHUB_USERNAME = 'bizmedia1';
const REPO_NAME = 'cta-control';
    const FILE_PATH = 'config.json';

    // IMPORTANT:
    // Create a GitHub token later and paste it below
    
    // =============================
    // LOAD CURRENT LINK
    // =============================

    async function loadCurrentLink() {

      try {

        const response = await fetch(
          `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/config.json`
        );

        const data = await response.json();

        document.getElementById('linkInput').value = data.whatsapp;

      } catch (error) {

        console.log(error);

      }

    }

    loadCurrentLink();

    // =============================
    // SAVE NEW LINK
    // =============================

    document.getElementById('saveBtn').addEventListener('click', async () => {

      const status = document.getElementById('status');
      const newLink = document.getElementById('linkInput').value.trim();

      if (!newLink) {
        status.innerText = 'Please enter a valid link';
        return;
      }

      status.innerText = 'Updating...';

      try {

        const update = await fetch('/api/update', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json'
  },
  body: JSON.stringify({
    whatsapp: newLink
  })
});

const result = await update.json();

if (update.ok) {

  status.innerText = 'Link updated successfully';

} else {

  status.innerText =
    'Error: ' + (result.message || 'Update failed');

}

      } catch (error) {

        console.log(error);
        status.innerText = 'Something went wrong';

      }

    });

  </script></body>
</html>
